<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Contratos Independente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #334155;
            --accent: #2563eb;
            --success: #16a34a;
            --warning: #ca8a04;
            --danger: #dc2626;
            --bg: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--primary); padding: 20px; }

        .wrapper { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* Área de Cadastro - Otimizada para Desktop */
        .panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 2fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .calc-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: var(--secondary); text-transform: uppercase; }
        
        input, select {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 14px;
        }

        input[readonly] { background-color: #edf2f7; color: #475569; font-weight: bold; border-style: dashed; }

        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add { background: var(--accent); color: white; }
        .btn-report { background: var(--secondary); color: white; }

        /* Tabela de Controle */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th { background: var(--primary); color: white; text-align: left; padding: 12px; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Cores de Status Legíveis */
        .row-expired { background-color: #fff1f2; }
        .text-expired { color: var(--danger); font-weight: bold; }
        .text-warning { color: var(--warning); font-weight: bold; }
        .text-ok { color: var(--success); font-weight: bold; }

        .actions-cell { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--secondary); padding: 4px; }
        .action-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h2>SISTEMA INDEPENDENTE DE CONTRATOS</h2>
        <div id="clock" style="font-weight: bold;"></div>
    </header>

    <div class="panel">
        <form id="contractForm">
            <input type="hidden" id="editId">
            <div class="form-row">
                <div class="field">
                    <label>Nome do Funcionário</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="field">
                    <label>Matrícula</label>
                    <input type="text" id="matricula" required>
                </div>
                <div class="field">
                    <label>Turno</label>
                    <select id="turno">
                        <option value="12x36">12x36</option>
                        <option value="5x2">5x2</option>
                        <option value="6x1">6x1</option>
                    </select>
                </div>
                <div class="field">
                    <label>Posto de Serviço</label>
                    <input type="text" id="posto" required>
                </div>
            </div>

            <div class="calc-row">
                <div class="field">
                    <label>📅 Data de Início</label>
                    <input type="date" id="dataInicio" required onchange="processarPrazos()">
                </div>
                <div class="field">
                    <label>🔒 Término 45 Dias (Automático)</label>
                    <input type="date" id="data45" readonly>
                </div>
                <div class="field">
                    <label>🔒 Término 90 Dias (Automático)</label>
                    <input type="date" id="data90" readonly>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-report" onclick="exportarRelatorio()">
                    <i data-lucide="file-down"></i> Gerar PDF
                </button>
                <button type="submit" class="btn-add">
                    <i data-lucide="plus-circle"></i> Salvar no Sistema
                </button>
            </div>
        </form>
    </div>

    <div class="panel" style="padding: 0;">
        <table id="contractTable">
            <thead>
                <tr>
                    <th>Colaborador</th>
                    <th>Posto</th>
                    <th>Início</th>
                    <th>45 Dias</th>
                    <th>90 Dias</th>
                    <th>Situação (45d)</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('db_contratos_local')) || [];

    // Lógica de Automação de Datas
    function processarPrazos() {
        const inputInicio = document.getElementById('dataInicio').value;
        if (!inputInicio) return;

        const dataBase = new Date(inputInicio);
        
        // Cálculo 45 dias
        const d45 = new Date(dataBase);
        d45.setDate(d45.getDate() + 45);
        
        // Cálculo 90 dias
        const d90 = new Date(dataBase);
        d90.setDate(d90.getDate() + 90);

        document.getElementById('data45').value = d45.toISOString().split('T')[0];
        document.getElementById('data90').value = d90.toISOString().split('T')[0];
    }

    // Gerenciamento de Dados
    const form = document.getElementById('contractForm');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        
        const registro = {
            id: id ? parseInt(id) : Date.now(),
            nome: document.getElementById('nome').value.toUpperCase(),
            matricula: document.getElementById('matricula').value,
            turno: document.getElementById('turno').value,
            posto: document.getElementById('posto').value.toUpperCase(),
            dataInicio: document.getElementById('dataInicio').value,
            data45: document.getElementById('data45').value,
            data90: document.getElementById('data90').value
        };

        if(id) {
            const idx = db.findIndex(item => item.id == id);
            db[idx] = registro;
        } else {
            db.push(registro);
        }

        saveAndRefresh();
        form.reset();
        document.getElementById('editId').value = '';
    });

    function saveAndRefresh() {
        localStorage.setItem('db_contratos_local', JSON.stringify(db));
        render();
    }

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const hoje = new Date();
        hoje.setHours(0,0,0,0);

        db.sort((a, b) => new Date(a.data45) - new Date(b.data45)).forEach(item => {
            const d45 = new Date(item.data45);
            d45.setHours(23,59,59,999);
            
            const diffDays = Math.ceil((d45 - hoje) / (1000 * 60 * 60 * 24));
            
            let statusText = `${diffDays} dias`;
            let statusClass = 'text-ok';
            let rowClass = '';

            if (diffDays < 0) {
                statusText = "VENCIDO";
                statusClass = "text-expired";
                rowClass = "row-expired";
            } else if (diffDays <= 7) {
                statusClass = "text-expired";
            } else if (diffDays <= 15) {
                statusClass = "text-warning";
            }

            tbody.innerHTML += `
                <tr class="${rowClass}">
                    <td><strong>${item.nome}</strong><br><small>${item.matricula}</small></td>
                    <td>${item.posto}</td>
                    <td>${format(item.dataInicio)}</td>
                    <td>${format(item.data45)}</td>
                    <td>${format(item.data90)}</td>
                    <td class="${statusClass}">${statusText}</td>
                    <td class="actions-cell">
                        <button class="action-btn" onclick="prepararEdicao(${item.id})"><i data-lucide="edit"></i></button>
                        <button class="action-btn" onclick="remover(${item.id})" style="color:red"><i data-lucide="trash"></i></button>
                    </td>
                </tr>
            `;
        });
        lucide.createIcons();
    }

    function format(d) {
        const [y, m, day] = d.split('-');
        return `${day}/${m}/${y}`;
    }

    window.remover = (id) => {
        if(confirm("Excluir este registro permanentemente?")) {
            db = db.filter(i => i.id !== id);
            saveAndRefresh();
        }
    }

    window.prepararEdicao = (id) => {
        const item = db.find(i => i.id === id);
        document.getElementById('editId').value = item.id;
        document.getElementById('nome').value = item.nome;
        document.getElementById('matricula').value = item.matricula;
        document.getElementById('posto').value = item.posto;
        document.getElementById('dataInicio').value = item.dataInicio;
        processarPrazos();
    }

    // Exportação PDF Independente
    window.exportarRelatorio = () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        doc.setFontSize(16);
        doc.text("CONTROLE DE VENCIMENTOS - OPERACIONAL", 14, 15);
        
        const data = db.map(i => [
            i.nome, i.posto, format(i.dataInicio), format(i.data45), format(i.data90)
        ]);

        doc.autoTable({
            head: [['NOME', 'POSTO', 'INÍCIO', '45 DIAS', '90 DIAS']],
            body: data,
            startY: 25,
            theme: 'grid',
            headStyles: { fillColor: [15, 23, 42] }
        });

        doc.save('Relatorio_Contratos_Local.pdf');
    }

    // Relógio
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString();
    }, 1000);

    render();
</script>
</body>
</html>
